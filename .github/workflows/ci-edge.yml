name: CI Edge Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared observability library
        run: python -m pip install ./libs/observability

      - name: Billing — install & compile & test
        run: |
          python -m pip install -r services/billing/requirements.txt
          python -m compileall -q services/billing/restro_billing
          cd services/billing && python -m pytest tests/ -q

      - name: Inventory — install & compile & test
        run: |
          python -m pip install -r services/inventory/requirements.txt
          python -m compileall -q services/inventory/restro_inventory
          cd services/inventory && python -m pytest tests/ -q

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build gateway
        run: |
          cd services/gateway
          go build ./...

      - name: Build sync manager
        run: |
          cd services/sync
          go build ./...

      - name: Docker compose validation
        run: |
          docker compose -f infra/docker/docker-compose.yml config

  publish-edge-images:
    if: github.ref == 'refs/heads/main'
    needs: test-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./services/gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/gateway:latest
      - uses: docker/build-push-action@v6
        with:
          context: ./services/billing
          push: true
          tags: ghcr.io/${{ github.repository }}/billing:latest
      - uses: docker/build-push-action@v6
        with:
          context: ./services/inventory
          push: true
          tags: ghcr.io/${{ github.repository }}/inventory:latest
      - uses: docker/build-push-action@v6
        with:
          context: ./services/sync
          push: true
          tags: ghcr.io/${{ github.repository }}/sync:latest
