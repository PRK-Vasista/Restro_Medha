apiVersion: v1
kind: Namespace
metadata:
  name: restro-medha
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: restro-medha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/example/restro/gateway:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: restro-medha
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
